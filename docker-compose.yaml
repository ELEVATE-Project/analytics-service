version: '3.8'

services:
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - POSTGRES_SEEDS=host.docker.internal
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - DB_PORT=5432
      # Optional: Explicitly tell Temporal which database name to use/create on your local Postgres instance
      - TEMPORAL_DB=temporal
      - TEMPORAL_VISIBILITY_DB=temporal_visibility
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # The auto-setup image binds the frontend service to the container's own
      # network IP, not loopback — so a /dev/tcp/127.0.0.1 probe never connects.
      # Check /proc/net/tcp directly for a LISTEN (0A) socket on port 7233 (0x1C41).
      test: ["CMD-SHELL", "awk '$2 ~ /:1C41$/ && $4==\"0A\" {f=1} END{exit !f}' /proc/net/tcp"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    ports:
      - "8233:8080" # <--- Change the second number from 8233 to 8080
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_UI_PORT=8080
    depends_on:
      - temporal

